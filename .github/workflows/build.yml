name: Build & Package

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gates: typecheck, lint, test, renderer build ──────────────────
  quality:
    name: Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (production bundle)
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-out
          path: out/
          retention-days: 1

  # ── macOS — Universal DMG (Intel x64 + Apple Silicon arm64) ───────────────
  package-macos:
    name: Package macOS (Universal DMG)
    needs: quality
    runs-on: macos-latest
    # Only run on version tags or direct pushes to main
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    env:
      # macOS code-signing — base64-encoded .p12 certificate stored in GitHub Secrets.
      # electron-builder skips signing automatically when these are absent.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # Apple notarisation — required for Gatekeeper acceptance on macOS 10.14.5+
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: build-out
          path: out/

      - name: Generate placeholder icon (if missing)
        run: node scripts/generate-icons.mjs

      - name: Package macOS (Universal DMG)
        run: electron-builder --mac --universal --publish never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          retention-days: 7

  # ── Windows — NSIS installer (x64) ────────────────────────────────────────
  package-windows:
    name: Package Windows (NSIS x64)
    needs: quality
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    env:
      # Windows code-signing — base64-encoded .p12 certificate stored in GitHub Secrets.
      # electron-builder skips signing automatically when these are absent.
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: build-out
          path: out/

      - name: Generate placeholder icon (if missing)
        run: node scripts/generate-icons.mjs

      - name: Package Windows (NSIS x64)
        run: electron-builder --win --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 7
