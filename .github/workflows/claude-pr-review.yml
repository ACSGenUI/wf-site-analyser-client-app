name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  fallow-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fallow audit
        id: fallow-audit
        run: |
          set +e
          npx fallow@2 audit \
            --base "${{ github.event.pull_request.base.ref }}" \
            --format json --quiet --explain \
            > fallow-audit.json
          audit_exit=$?
          set -e
          if [ ! -s fallow-audit.json ]; then
            echo "verdict=error" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          verdict=$(jq -r '.verdict // "error"' fallow-audit.json)
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          echo "Fallow audit verdict: $verdict (cli exit: $audit_exit)"
          if [ "$verdict" = "fail" ]; then
            exit 1
          fi

      - name: Upload fallow audit report
        if: always() && hashFiles('fallow-audit.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: fallow-audit
          path: fallow-audit.json
          if-no-files-found: ignore

  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Static analysis (fallow audit) runs in a separate parallel CI job. Focus this review on the PR diff and project conventions below.

            Step 1 — fetch the diff with ONE command only:
              gh pr diff ${{ github.event.pull_request.number }}

            Step 2 — review ONLY the diff output from Step 1. Do NOT call Read, Grep, Glob, or any other tool to open files. Every issue you flag must be traceable to a specific + line in the diff. If you cannot see the violation in the diff, do not flag it.

            WHAT TO IGNORE:
            - Lines starting with space or - (unchanged/removed context) — not your concern
            - src/renderer/styles/tokens.css, tokens.d.ts, tokens.js — auto-generated by `npm run build:tokens`; skip entirely
            - package-lock.json churn unless a dependency change introduces a known vulnerability
            - Issues that were already present before this PR — if the + line is just moving or copying existing code, skip it
            - Stylistic preferences, minor nitpicks, or anything subjective

            WHAT TO FLAG:
            Only violations clearly visible in the + lines that would cause a bug, security issue, or break WF Site Analyser project conventions.

            Step 3 — post ALL inline comments in one batch using mcp__github_inline_comment__create_inline_comment (confirmed: true). Only on + lines. If nothing to flag, skip this step.

            Step 4 — post ONE summary using: gh pr comment ${{ github.event.pull_request.number }} --body "..."

            ---

            WF SITE ANALYSER RULES (check only what is visible in the diff):

            ELECTRON / IPC:
            - Renderer (`src/renderer/**`) must call `window.api` only — never `import ... from 'electron'` or use `ipcRenderer`/`ipcMain` directly.
            - `ipcRenderer` and `contextBridge` belong only in `src/preload/**`.
            - New IPC channels must be added to `IPC_CHANNELS` in `src/shared/types.ts` and mirrored in the preload `ElectronAPI` interface and main-process handler.
            - Main-process handlers must validate/sanitize untrusted input (especially URLs passed to `shell:openExternal`, file paths, and user-supplied analysis config).
            - IPC event listeners exposed via preload must return a cleanup function; renderer `useEffect` hooks must call it on unmount.

            TYPESCRIPT / REACT:
            - No `any` — project ESLint enforces `@typescript-eslint/no-explicit-any`.
            - `const`/`let` only (no `var`). Follow React hooks rules (`rules-of-hooks`, `exhaustive-deps`).
            - `await` all async calls; wrap `fetch()` and `JSON.parse()` in try/catch where failures would break UX.
            - Guard optional/nullable values before property access in IPC callbacks and store selectors.

            STYLING / DESIGN TOKENS:
            - Tailwind utility classes only in components — no inline `style=` attributes, no CSS modules.
            - Visual values come from design tokens (`tokens/*.json` → `--wf-*` CSS vars → Tailwind theme). Edit `tokens/*.json`, never `src/renderer/styles/tokens.css`.
            - Spacing, font-size, and border-radius token values must include `px` units.

            STATE / FORMS / UI:
            - Shared/global state via Zustand (`src/renderer/store/`).
            - Forms via React Hook Form + Zod validation.
            - Accessible primitives via Radix UI (Dialog, Switch, Select, DropdownMenu, Tabs).

            FILE PLACEMENT:
            - Reusable UI → `src/renderer/components/`
            - Feature screens → `src/renderer/features/<area>/`
            - Zustand stores → `src/renderer/store/`
            - Hooks → `src/renderer/hooks/`
            - Cross-process types → `src/shared/types.ts`
            - Tests → `src/renderer/__tests__/<area>/` (Vitest + React Testing Library; do not skip or weaken assertions)

            SECURITY:
            - No API keys, OAuth secrets, tokens, or credentials committed in source, `.env*`, or test fixtures.
            - Sensitive values must use `safeStorage` IPC, not plain `storeSet` or localStorage.
            - No `eval()`. No `dangerouslySetInnerHTML` with unsanitized user or external content.
            - External URLs opened via `shell:openExternal` must be validated (https only, allowlisted domains where applicable).

            ---

            SUMMARY FORMAT (post via gh pr comment):

            ### Claude WF Site Analyser Code Review

            **Critical** (must fix before merge — security, XSS, leaked secrets, broken IPC contract, renderer importing electron)
            - <issue> — <file>:<line>

            **High** (should fix before merge — bugs, convention violations, missing null checks, token/CSS misuse)
            - <issue> — <file>:<line>

            **Looks good**
            - <what passed>

            **Areas reviewed:** <list each changed area — e.g. auth, analysis, settings, components, main/preload IPC — pass/fail>

          claude_args: >-
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*)"
        env:
          INPUT_MAX_TURNS: "12"
